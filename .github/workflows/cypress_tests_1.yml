name: CypressTests1
on: [push, workflow_dispatch]

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx cypress run --record
        continue-on-error: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}